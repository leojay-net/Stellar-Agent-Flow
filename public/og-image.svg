<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#6366f1" flood-opacity="0.25"/>
    </filter>
    <radialGradient id="spotlight" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#spotlight)"/>
  
  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#818cf8" stroke-width="1">
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
  </g>
  
  <!-- Flow diagram (left side) -->
  <g transform="translate(80, 100)" filter="url(#shadow)">
    <!-- Node 1 -->
    <rect x="0" y="40" width="90" height="50" rx="12" fill="#1e293b" stroke="url(#accent)" stroke-width="2"/>
    <circle cx="30" cy="65" r="8" stroke="#818cf8" stroke-width="1.5" fill="none"/>
    <path d="M26 61 Q30 57 34 61" stroke="#818cf8" stroke-width="1" fill="none"/>
    <circle cx="54" cy="60" r="2" fill="#6366f1"/>
    <circle cx="60" cy="65" r="2" fill="#6366f1"/>
    <circle cx="54" cy="70" r="2" fill="#6366f1"/>
    
    <!-- Edge 1→2 -->
    <path d="M90 65 L140 65" stroke="url(#glow)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <circle cx="115" cy="65" r="2.5" fill="#a78bfa" opacity="0.8"/>
    
    <!-- Node 2 -->
    <rect x="140" y="20" width="110" height="90" rx="14" fill="#1e293b" stroke="url(#accent)" stroke-width="2.5"/>
    <polygon points="195,40 210,48 210,64 195,72 180,64 180,48" stroke="#818cf8" stroke-width="2" fill="none"/>
    <circle cx="195" cy="56" r="5" fill="url(#accent)"/>
    <line x1="195" y1="40" x2="195" y2="34" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="210" y1="48" x2="216" y2="44" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="210" y1="64" x2="216" y2="68" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="195" y1="72" x2="195" y2="78" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="180" y1="64" x2="174" y2="68" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="180" y1="48" x2="174" y2="44" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="195" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">orchestrator</text>
    
    <!-- Edge 2→3a -->
    <path d="M250 45 L310 25" stroke="url(#glow)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <circle cx="280" cy="35" r="2.5" fill="#a78bfa" opacity="0.8"/>
    
    <!-- Edge 2→3b -->
    <path d="M250 85 L310 105" stroke="url(#glow)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <circle cx="280" cy="95" r="2.5" fill="#a78bfa" opacity="0.8"/>
    
    <!-- Edge 2→3c -->
    <path d="M250 65 L310 65" stroke="url(#cyan)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    
    <!-- Node 3a -->
    <rect x="310" y="0" width="80" height="45" rx="10" fill="#1e293b" stroke="url(#cyan)" stroke-width="2"/>
    <path d="M330 16 L322 22 L330 28" stroke="#22d3ee" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M352 16 L360 22 L352 28" stroke="#22d3ee" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="344" y1="14" x2="338" y2="30" stroke="#06b6d4" stroke-width="1" stroke-linecap="round"/>
    
    <!-- Node 3b -->
    <rect x="310" y="50" width="80" height="45" rx="10" fill="#1e293b" stroke="url(#accent)" stroke-width="2"/>
    <rect x="330" y="64" width="20" height="14" rx="3" stroke="#818cf8" stroke-width="1.5" fill="none"/>
    <circle cx="346" cy="71" r="2.5" fill="#6366f1"/>
    
    <!-- Node 3c -->
    <rect x="310" y="100" width="80" height="45" rx="10" fill="#1e293b" stroke="url(#cyan)" stroke-width="2"/>
    <rect x="330" y="116" width="5" height="12" rx="1" fill="#22d3ee" opacity="0.5"/>
    <rect x="338" y="112" width="5" height="16" rx="1" fill="#22d3ee" opacity="0.7"/>
    <rect x="346" y="108" width="5" height="20" rx="1" fill="url(#cyan)"/>
    <rect x="354" y="114" width="5" height="14" rx="1" fill="#22d3ee" opacity="0.6"/>

    <!-- Edge 1 top input -->
    <rect x="0" y="0" width="60" height="30" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5" opacity="0.5"/>
    <path d="M20 10 L30 15 L20 20" stroke="#64748b" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M30 10 L40 15 L30 20" stroke="#64748b" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M60 15 L78 40" stroke="#475569" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    
    <!-- Bottom satellite -->
    <rect x="60" y="140" width="70" height="35" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5" opacity="0.5"/>
    <circle cx="85" cy="157" r="6" stroke="#64748b" stroke-width="1" fill="none"/>
    <circle cx="85" cy="157" r="2" fill="#475569"/>
    <circle cx="105" cy="155" r="1.5" fill="#475569"/>
    <circle cx="110" cy="160" r="1.5" fill="#475569"/>
    <path d="M130 157 L170 110" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4 4" opacity="0.3"/>
  </g>
  
  <!-- Right side: Text content -->
  <g transform="translate(560, 140)">
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="72" fill="white" letter-spacing="-1">
      <tspan x="0" y="0">Agent</tspan>
      <tspan x="0" y="80" fill="url(#accent)">Flow</tspan>
    </text>
    
    <line x1="0" y1="110" x2="140" y2="110" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
    
    <text x="0" y="150" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="22" fill="#94a3b8" letter-spacing="0.5">
      <tspan x="0" dy="0">Web3 Multi-Agent Orchestrator</tspan>
    </text>
    
    <text x="0" y="200" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="16" fill="#64748b" letter-spacing="0.3">
      <tspan x="0" dy="0">43 agents · 23 protocols · Zero code</tspan>
    </text>
    
    <!-- Tag pills -->
    <g transform="translate(0, 240)">
      <rect x="0" y="0" width="65" height="28" rx="14" fill="#1e293b" stroke="#6366f1" stroke-width="1"/>
      <text x="32" y="18" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#818cf8">DeFi</text>
      
      <rect x="75" y="0" width="60" height="28" rx="14" fill="#1e293b" stroke="#6366f1" stroke-width="1"/>
      <text x="105" y="18" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#818cf8">NFT</text>
      
      <rect x="145" y="0" width="80" height="28" rx="14" fill="#1e293b" stroke="#06b6d4" stroke-width="1"/>
      <text x="185" y="18" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#22d3ee">Identity</text>
      
      <rect x="235" y="0" width="105" height="28" rx="14" fill="#1e293b" stroke="#06b6d4" stroke-width="1"/>
      <text x="287" y="18" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#22d3ee">Governance</text>
      
      <rect x="350" y="0" width="85" height="28" rx="14" fill="#1e293b" stroke="#6366f1" stroke-width="1"/>
      <text x="392" y="18" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#818cf8">Analytics</text>
    </g>
  </g>
  
  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0f172a" opacity="0.6"/>
  <text x="600" y="616" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="13" fill="#475569" letter-spacing="3">THE SYNTHESIS HACKATHON 2026</text>
</svg>