<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#818cf8" stroke-width="1">
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
  </g>
  
  <!-- Connection lines (flow edges) -->
  <g filter="url(#shadow)">
    <!-- Top node to center -->
    <path d="M 256 140 L 256 210" stroke="url(#glow)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <!-- Center to bottom-left -->
    <path d="M 220 280 L 160 340" stroke="url(#glow)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <!-- Center to bottom-right -->
    <path d="M 292 280 L 352 340" stroke="url(#glow)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <!-- Left to center -->
    <path d="M 160 220 L 220 248" stroke="url(#cyan)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Right to center -->
    <path d="M 352 220 L 292 248" stroke="url(#cyan)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Animated flow dots on edges -->
  <circle cx="256" cy="175" r="3" fill="#a78bfa" opacity="0.8"/>
  <circle cx="188" cy="312" r="3" fill="#a78bfa" opacity="0.8"/>
  <circle cx="324" cy="312" r="3" fill="#a78bfa" opacity="0.8"/>
  
  <!-- Top node (input agent) -->
  <g filter="url(#shadow)">
    <rect x="216" y="100" width="80" height="48" rx="12" fill="#1e293b" stroke="url(#accent)" stroke-width="2.5"/>
    <!-- Brain/AI icon -->
    <circle cx="244" cy="124" r="8" stroke="#818cf8" stroke-width="2" fill="none"/>
    <path d="M240 120 Q244 116 248 120" stroke="#818cf8" stroke-width="1.5" fill="none"/>
    <path d="M240 128 Q244 132 248 128" stroke="#818cf8" stroke-width="1.5" fill="none"/>
    <circle cx="268" cy="118" r="2" fill="#6366f1"/>
    <circle cx="274" cy="124" r="2" fill="#6366f1"/>
    <circle cx="268" cy="130" r="2" fill="#6366f1"/>
  </g>
  
  <!-- Center node (orchestrator - larger, primary) -->
  <g filter="url(#shadow)">
    <rect x="204" y="220" width="104" height="64" rx="16" fill="#1e293b" stroke="url(#accent)" stroke-width="3"/>
    <!-- Flow/orchestrator symbol - interconnected hexagon -->
    <polygon points="256,234 270,242 270,258 256,266 242,258 242,242" stroke="#818cf8" stroke-width="2" fill="none"/>
    <circle cx="256" cy="250" r="6" fill="url(#accent)"/>
    <!-- Radiating lines from center -->
    <line x1="256" y1="234" x2="256" y2="228" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="270" y1="242" x2="276" y2="238" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="270" y1="258" x2="276" y2="262" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="256" y1="266" x2="256" y2="272" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="242" y1="258" x2="236" y2="262" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="242" y1="242" x2="236" y2="238" stroke="#a78bfa" stroke-width="1.5"/>
  </g>
  
  <!-- Left satellite node -->
  <g filter="url(#shadow)">
    <rect x="112" y="196" width="56" height="48" rx="10" fill="#1e293b" stroke="url(#cyan)" stroke-width="2"/>
    <!-- Chain link icon -->
    <rect x="128" y="210" width="12" height="8" rx="4" stroke="#22d3ee" stroke-width="1.5" fill="none" transform="rotate(-30 134 214)"/>
    <rect x="140" y="218" width="12" height="8" rx="4" stroke="#22d3ee" stroke-width="1.5" fill="none" transform="rotate(-30 146 222)"/>
  </g>
  
  <!-- Right satellite node -->
  <g filter="url(#shadow)">
    <rect x="344" y="196" width="56" height="48" rx="10" fill="#1e293b" stroke="url(#cyan)" stroke-width="2"/>
    <!-- Wallet icon -->
    <rect x="360" y="212" width="24" height="16" rx="3" stroke="#22d3ee" stroke-width="1.5" fill="none"/>
    <circle cx="378" cy="220" r="3" fill="#06b6d4"/>
  </g>
  
  <!-- Bottom-left output node -->
  <g filter="url(#shadow)">
    <rect x="120" y="340" width="72" height="48" rx="12" fill="#1e293b" stroke="url(#accent)" stroke-width="2"/>
    <!-- Code/execute icon -->
    <path d="M140 356 L132 364 L140 372" stroke="#818cf8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M164 356 L172 364 L164 372" stroke="#818cf8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="155" y1="354" x2="149" y2="374" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- Bottom-right output node -->
  <g filter="url(#shadow)">
    <rect x="320" y="340" width="72" height="48" rx="12" fill="#1e293b" stroke="url(#accent)" stroke-width="2"/>
    <!-- Chart/analytics icon -->
    <rect x="340" y="366" width="6" height="14" rx="1" fill="#818cf8" opacity="0.6"/>
    <rect x="350" y="358" width="6" height="22" rx="1" fill="#818cf8" opacity="0.8"/>
    <rect x="360" y="350" width="6" height="30" rx="1" fill="url(#accent)"/>
    <rect x="370" y="362" width="6" height="18" rx="1" fill="#818cf8" opacity="0.7"/>
  </g>
  
  <!-- "AF" wordmark at bottom -->
  <text x="256" y="438" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="36" fill="white" letter-spacing="6" opacity="0.9">AGENTFLOW</text>
  <text x="256" y="458" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="13" fill="#818cf8" letter-spacing="4" opacity="0.7">MULTI-AGENT ORCHESTRATOR</text>
</svg>